    notes: "直接对应"

  - cas_note_id: "CAS-N19"
    cas_note_name: "短期借款及长期借款"
    hkfrs_note_id: null
    hkfrs_note_name: null
    confidence: medium
    notes: "HKFRS通常将借款嵌入Financial Instruments或单独在Note中披露，无统一标准Note"

  - cas_note_id: "CAS-N20"
