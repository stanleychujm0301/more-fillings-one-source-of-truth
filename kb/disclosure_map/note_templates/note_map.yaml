    hkfrs_note_name: "Other Intangible Assets"
    confidence: high
    notes: "CAS通常将商誉和无形资产合并或分别披露；HKFRS通常分开"

  - cas_note_id: "CAS-N16"
    cas_note_name: "商誉"
    hkfrs_note_id: "HK-N14"
