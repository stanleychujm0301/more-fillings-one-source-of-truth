    confidence: high
    notes: "直接对应"

  - cas_note_id: "CAS-N11"
    cas_note_name: "长期股权投资"
    hkfrs_note_id: "HK-N16"
    hkfrs_note_name: "Interests in Associates and Joint Ventures"
    confidence: high
    notes: "直接对应；注意HKFRS可能将子公司投资单独列示"

  - cas_note_id: "CAS-N12"
    cas_note_name: "投资性房地产"
    hkfrs_note_id: "HK-N13"
    hkfrs_note_name: "Investment Properties"
    confidence: high
    notes: "直接对应"

  - cas_note_id: "CAS-N13"
