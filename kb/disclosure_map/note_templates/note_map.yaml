# CAS 附注 ↔ HKFRS Note 映射表
# 映射规则：基于准则主题内容对应，而非具体编号对应
# 注意：不同公司的附注编号差异很大，映射应基于内容主题而非编号

mappings:
  # 一般信息
  - cas_note_id: "CAS-N01"
    cas_note_name: "公司基本情况"
    hkfrs_note_id: "HK-N01"
    hkfrs_note_name: "General Information"
    confidence: high
    notes: "直接对应"

  - cas_note_id: "CAS-N02"
    cas_note_name: "财务报表的编制基础"
    hkfrs_note_id: "HK-N02"
    hkfrs_note_name: "Basis of Preparation"
    confidence: high
    notes: "直接对应"

  - cas_note_id: "CAS-N03"
    cas_note_name: "遵循企业会计准则的声明"
    hkfrs_note_id: "HK-N03"
    hkfrs_note_name: "Adoption of New and Revised HKFRSs"
    confidence: medium
    notes: "CAS为合规声明，HKFRS为准则变更；内容相关但不完全对应"

  - cas_note_id: "CAS-N04"
    cas_note_name: "重要会计政策和会计估计"
    hkfrs_note_id: "HK-N04"
    hkfrs_note_name: "Significant Accounting Policies"
    confidence: high
    notes: "直接对应"

  - cas_note_id: "CAS-N05"
    cas_note_name: "会计政策和会计估计变更以及差错更正"
    hkfrs_note_id: "HK-N03"
    hkfrs_note_name: "Adoption of New and Revised HKFRSs"
    confidence: medium
    notes: "CAS单独列示变更和差错更正，HKFRS在准则变更中体现"

  # 资产负债表项目
  - cas_note_id: "CAS-N08"
    cas_note_name: "货币资金"
    hkfrs_note_id: "HK-N20"
    hkfrs_note_name: "Cash and Cash Equivalents / Pledged Deposits"
    confidence: high
    notes: "CAS货币资金 ↔ HKFRS Cash and Cash Equivalents"

  - cas_note_id: "CAS-N09"
    cas_note_name: "应收票据及应收账款"
    hkfrs_note_id: "HK-N19"
    hkfrs_note_name: "Trade and Other Receivables"
    confidence: high
    notes: "直接对应"

  - cas_note_id: "CAS-N10"
    cas_note_name: "存货"
    hkfrs_note_id: "HK-N18"
