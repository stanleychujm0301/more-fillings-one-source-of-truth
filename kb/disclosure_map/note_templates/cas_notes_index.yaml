# CAS 财务报表附注标准索引
# 依据：财政部《企业会计准则第30号——财务报表列报》应用指南及实务惯例
# 注：A股公司附注编号通常为阿拉伯数字顺序，但具体编号和标题因公司而异
# 以下为最常见的标准附注结构，覆盖一般工商企业

standard:
  name: "CAS 财务报表附注标准结构"
  basis: "《企业会计准则第30号》应用指南"

notes:
  - id: "CAS-N01"
    name: "公司基本情况"
    category: "general"
    common_titles:
      - "公司基本情况"
      - "企业基本情况"
      - "集团简介"
    required: true
    content_summary: "公司注册地、组织形式、总部地址、业务性质、实际控制人"

  - id: "CAS-N02"
    name: "财务报表的编制基础"
    category: "general"
    common_titles:
