services:
  - type: web
    name: ahcc-competition
    env: docker
    plan: starter
    region: singapore
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHONUTF8
        value: "1"
      - key: STORAGE_DIR
        value: /var/data/storage
      - key: SQLITE_PATH
        value: /var/data/storage/ahcc.db
      - key: CHROMA_PERSIST_DIR
        value: /var/data/storage/chroma
      - key: DEEPSEEK_API_KEY
        sync: false
    disk:
      name: ahcc-storage
      mountPath: /var/data
      sizeGB: 2
